services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent-base-api
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      USE_CELERY: "true"
      PORT: "8000"
    command: sh -c "uv run uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    depends_on:
      - redis
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent-base-worker
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      USE_CELERY: "true"
    command: sh -c "uv run python -m celery -A app.core.celery_app:celery_app worker --pool=solo --loglevel=info"
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: agent-base-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  flower:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent-base-flower
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      USE_CELERY: "true"
    command: sh -c "uv run python -m celery -A app.core.celery_app:celery_app flower --port=5555"
    depends_on:
      - redis
    ports:
      - "5555:5555"
    profiles:
      - tools
    restart: unless-stopped

volumes:
  redis_data:
