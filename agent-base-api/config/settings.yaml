app:
  name: AGENT BASE API
  description: API for crewai agent management
  version: 0.1
  env: development


server:
  host: 0.0.0.0
  port: 8000
  reload: false

celery:
  broker: redis://localhost:6379/0
  backend: redis://localhost:6379/0

logger:
  level: INFO
  format: "{time} | {level} | {name} | {file}:{line} | {message}"
  rotation: 5 MB

cors:
  allow_origins:
    - "http://localhost:5173"
    - "http://127.0.0.1:5173"
    - "*"
  allow_methods:
    - "*"
  allow_headers:
    - "*"
  allow_credentials: false